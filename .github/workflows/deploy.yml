name: Deploy (Cloudflare Pages)

# Builds and deploys to Cloudflare Pages. Pushes to main publish to production;
# pull requests publish a preview deployment.
#
# REQUIRED repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID
# Also create a Pages project named "wow-freesim" once (or rename below).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=wow-freesim
