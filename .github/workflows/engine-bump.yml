# Strategy A: automated engine version bump + R2 upload + commit to main.
#
# A new simc-wasm release flows in without anyone hand-editing this repo:
#   1. The simc fork's release CI fires a `repository_dispatch` (type: engine-release)
#      with the new tag, OR you trigger this manually (workflow_dispatch).
#   2. We run scripts/bump-engine.mjs: vendor the same-origin simc.js glue +
#      rewrite the pin (tag/sha256) in src/engine/config.ts.
#   3. We download the 107 MB simc.wasm from the release and push it to R2 at
#      <tag>/simc.wasm (immutable cache, application/wasm). The app fetches this
#      cross-origin from the R2 custom domain in CORS mode.
#   4. We commit the glue + pin straight to `main`. Cloudflare Pages' Git integration
#      picks up the push and redeploys automatically — no deploy step on our side.
#
# Order matters: the wasm is in R2 (step 3) BEFORE the commit lands (step 4), so the
# redeploy's new pin always resolves to bytes that already exist. The commit uses the
# default GITHUB_TOKEN, which by design does NOT re-trigger Actions workflows (so a
# wrangler-based deploy.yml, if present, won't double-fire); Cloudflare's external Git
# webhook fires regardless of the token.
#
# Required repo secrets/vars (Settings → Secrets and variables → Actions):
#   secret CLOUDFLARE_API_TOKEN   — token with "R2 Storage: Edit" on the account
#   secret CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id
#   var    R2_ENGINE_BUCKET       — the R2 bucket name (e.g. wow-freesim-engine)

name: engine-bump

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'simc-wasm release tag (e.g. v1206.02)'
        required: true
  repository_dispatch:
    types: [engine-release]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.event.client_payload.tag }}
    steps:
      # Always operate on main: bump-engine rewrites the pin against main's content
      # and the final step commits straight back to it.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate tag
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Missing/invalid tag: '$TAG' (expected vNNNN.NN)"; exit 1
          fi

      # Vendor the glue + rewrite the pin (tag/scVersion/sha256) in config.ts.
      - name: Bump engine pin
        run: node scripts/bump-engine.mjs "$TAG"

      # Push the 107 MB wasm to R2. We fetch the bytes, then bump-engine.mjs has
      # already recorded the expected sha256 in config.ts; verify before upload so
      # a bad release never reaches R2.
      - name: Upload simc.wasm to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BUCKET: ${{ vars.R2_ENGINE_BUCKET }}
        run: |
          set -euo pipefail
          url="https://github.com/a-vasilev/simc-wasm/releases/download/$TAG/simc.wasm"
          curl -fsSL "$url" -o simc.wasm
          want=$(grep -oE "wasm: '[0-9a-f]{64}'" src/engine/config.ts | grep -oE '[0-9a-f]{64}')
          got=$(sha256sum simc.wasm | cut -d' ' -f1)
          if [[ "$got" != "$want" ]]; then
            echo "::error::simc.wasm sha256 mismatch (got $got, want $want)"; exit 1
          fi
          npx --yes wrangler@4 r2 object put \
            "$BUCKET/$TAG/simc.wasm" \
            --file simc.wasm --remote \
            --content-type application/wasm \
            --cache-control "public, max-age=31536000, immutable"
          rm -f simc.wasm

      # Commit the vendored glue + rewritten pin straight to main. The push uses the
      # checkout's default GITHUB_TOKEN credentials; Cloudflare Pages' Git integration
      # sees the push and redeploys. No-op if re-bumping the already-pinned tag.
      - name: Commit to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/engine src/engine/config.ts
          if git diff --cached --quiet; then
            echo "No changes to commit — already pinned to $TAG."
            exit 0
          fi
          git commit -m "Bump engine to $TAG"
          git push origin HEAD:main
